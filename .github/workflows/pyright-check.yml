name: Pyright Check

on: [pull_request]

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pyright
      run: npm install -g pyright

    - name: Create pyright config
      run: |
        cat <<EOF > pyrightconfig.json
        {
          "reportMissingImports": false
        }
        EOF

    - name: Run pyright on changed files
      run: pyright